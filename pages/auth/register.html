<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新規登録 — 東大阪吹奏楽団</title>
  <link rel="stylesheet" href="../../css/variables.css">
  <link rel="stylesheet" href="../../css/common.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      background: var(--navy-900);
      min-height: 100vh;
      padding: var(--space-8) var(--space-4);
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(201,168,76,0.06) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(37,77,122,0.3) 0%, transparent 60%);
      pointer-events: none;
    }
    .register-container { width:100%; max-width:640px; margin:0 auto; animation:fadeInUp 0.5s ease both; }
    .register-logo { text-align:center; margin-bottom:var(--space-6); }
    .register-logo__name { font-family:var(--font-display); font-size:var(--text-2xl); font-weight:700; color:var(--white); }
    .register-logo__sub { font-size:var(--text-xs); color:var(--gold-400); letter-spacing:.25em; text-transform:uppercase; display:block; margin-top:var(--space-1); }
    .register-card { background:rgba(255,255,255,0.04); border:1px solid rgba(201,168,76,0.2); border-radius:var(--radius-xl); padding:var(--space-8); backdrop-filter:blur(12px); }
    .register-card h2 { font-family:var(--font-display); font-size:var(--text-2xl); font-weight:700; color:var(--white); margin-bottom:var(--space-6); }
    .section-title { font-size:var(--text-xs); font-weight:500; color:var(--gold-400); letter-spacing:.2em; text-transform:uppercase; border-bottom:1px solid rgba(201,168,76,0.2); padding-bottom:var(--space-2); margin-bottom:var(--space-5); margin-top:var(--space-6); }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:var(--space-4); }
    .register-card .form-label { color:var(--gray-300); }
    .register-card .form-control { background:rgba(255,255,255,0.08); border-color:rgba(255,255,255,0.15); color:var(--white); }
    .register-card .form-control::placeholder { color:rgba(255,255,255,0.3); }
    .register-card .form-control:focus { border-color:var(--gold-500); box-shadow:0 0 0 3px rgba(201,168,76,0.15); }
    .register-card select.form-control option { background:var(--navy-800); color:var(--white); }
    .submit-btn { width:100%; padding:var(--space-4); background:var(--gold-500); color:var(--navy-900); border:none; border-radius:var(--radius-md); font-size:var(--text-base); font-weight:700; cursor:pointer; transition:all var(--transition-fast); font-family:var(--font-body); margin-top:var(--space-6); }
    .submit-btn:hover { background:var(--gold-400); box-shadow:var(--shadow-gold); }
    .submit-btn:disabled { opacity:.6; cursor:not-allowed; }
    .back-link { display:block; text-align:center; margin-top:var(--space-4); font-size:var(--text-sm); color:var(--gold-400); text-decoration:underline; text-underline-offset:2px; }
    .error-box { background:rgba(192,57,43,0.15); border:1px solid rgba(192,57,43,0.4); border-radius:var(--radius-md); padding:var(--space-3) var(--space-4); color:#f1948a; font-size:var(--text-sm); margin-bottom:var(--space-4); display:none; }
    .error-box.show { display:block; }
    @media(max-width:480px){ .form-row { grid-template-columns:1fr; } .register-card { padding:var(--space-5); } }
  </style>
</head>
<body>
<div class="register-container">
  <div class="register-logo">
    <span class="register-logo__name">東大阪吹奏楽団</span>
    <span class="register-logo__sub">HIGASUI WINDS · 団員登録</span>
  </div>

  <div class="register-card">
    <h2>新規団員登録</h2>
    <div class="error-box" id="error-box"></div>

    <!-- 基本情報 -->
    <p class="section-title">基本情報</p>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label" for="last-name">姓 <span class="required">*</span></label>
        <input type="text" id="last-name" class="form-control" placeholder="東大阪">
      </div>
      <div class="form-group">
        <label class="form-label" for="first-name">名 <span class="required">*</span></label>
        <input type="text" id="first-name" class="form-control" placeholder="太郎">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label" for="last-kana">姓（フリガナ）<span class="required">*</span></label>
        <input type="text" id="last-kana" class="form-control" placeholder="ヒガシオオサカ">
      </div>
      <div class="form-group">
        <label class="form-label" for="first-kana">名（フリガナ）<span class="required">*</span></label>
        <input type="text" id="first-kana" class="form-control" placeholder="タロウ">
      </div>
    </div>

    <!-- 役職（複数選択） -->
    <div class="form-group" style="margin-top:var(--space-2);">
      <label class="form-label">役職 <span class="required">*</span>
        <span style="font-size:var(--text-xs);color:var(--gray-500);font-weight:400;">（複数選択可）</span>
      </label>
      <div class="role-checkbox-group" id="role-group">
        <label class="role-checkbox-item">
          <input type="checkbox" name="role" value="member" checked>
          <span>一般団員</span>
        </label>
        <label class="role-checkbox-item">
          <input type="checkbox" name="role" value="conductor">
          <span>指揮者</span>
        </label>
        <label class="role-checkbox-item">
          <input type="checkbox" name="role" value="manager">
          <span>運営委員</span>
        </label>
        <label class="role-checkbox-item">
          <input type="checkbox" name="role" value="treasurer">
          <span>会計</span>
        </label>
        <label class="role-checkbox-item">
          <input type="checkbox" name="role" value="librarian">
          <span>蔵書委員</span>
        </label>
        <label class="role-checkbox-item">
          <input type="checkbox" name="role" value="admin">
          <span>管理者</span>
        </label>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label" for="part">パート <span class="required">*</span></label>
        <select id="part" class="form-control">
          <option value="">選択してください</option>
          <optgroup label="木管楽器">
            <option value="flute">フルート</option>
            <option value="oboe">オーボエ</option>
            <option value="clarinet">クラリネット</option>
            <option value="bassoon">ファゴット</option>
            <option value="saxophone">サクソフォーン</option>
          </optgroup>
          <optgroup label="金管楽器">
            <option value="horn">ホルン</option>
            <option value="trumpet">トランペット</option>
            <option value="trombone">トロンボーン</option>
            <option value="euphonium">ユーフォニアム</option>
            <option value="tuba">テューバ</option>
          </optgroup>
          <optgroup label="打楽器・その他">
            <option value="percussion">打楽器</option>
            <option value="contrabass">コントラバス</option>
            <option value="piano">ピアノ</option>
          </optgroup>
          <optgroup label="その他">
            <option value="staff">スタッフ</option>
            <option value="other">その他</option>
          </optgroup>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label" for="category">区分 <span class="required">*</span></label>
        <select id="category" class="form-control">
          <option value="">選択してください</option>
          <option value="regular">正団員</option>
          <option value="trainee">準団員</option>
          <option value="rest">休団中</option>
          <option value="support">賛助</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label" for="joined-date">在籍開始年月日 <span class="required">*</span></label>
        <input type="date" id="joined-date" class="form-control">
      </div>
    </div>

    <!-- 連絡先情報 -->
    <p class="section-title">連絡先情報</p>
    <div class="form-group">
      <label class="form-label" for="email">メールアドレス <span class="required">*</span></label>
      <input type="email" id="email" class="form-control" placeholder="example@mail.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label class="form-label" for="password">パスワード <span class="required">*</span></label>
      <input type="password" id="password" class="form-control" placeholder="8文字以上" autocomplete="new-password">
      <span class="form-hint" style="color:rgba(255,255,255,0.4);">英字・数字を含む8文字以上で設定してください。</span>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label" for="phone">電話番号</label>
        <input type="tel" id="phone" class="form-control" placeholder="090-0000-0000">
      </div>
      <div class="form-group">
        <label class="form-label" for="birthday">生年月日</label>
        <input type="date" id="birthday" class="form-control">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label" for="emergency-contact">緊急連絡先</label>
      <input type="text" id="emergency-contact" class="form-control" placeholder="氏名：続柄：電話番号">
      <span class="form-hint" style="color:rgba(255,255,255,0.4);">例：東大阪 花子：母：090-0000-0001</span>
    </div>

    <button class="submit-btn" id="register-btn" type="button">登録する</button>
    <a href="login.html" class="back-link">ログインに戻る</a>
  </div>
</div>

<script src="../../js/supabase.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    const btn      = document.getElementById('register-btn');
    const errorBox = document.getElementById('error-box');

    btn.addEventListener('click', async () => {
      errorBox.classList.remove('show');

      // 役職チェックボックスから選択済みを取得
      const selectedRoles = [...document.querySelectorAll('input[name="role"]:checked')]
        .map(cb => cb.value);

      if (selectedRoles.length === 0) {
        errorBox.textContent = '役職を1つ以上選択してください。';
        errorBox.classList.add('show');
        return;
      }

      // 必須項目チェック
      const requiredFields = ['last-name','first-name','last-kana','first-kana','part','category','joined-date','email','password'];
      const missing = requiredFields.filter(id => !document.getElementById(id).value.trim());
      if (missing.length > 0) {
        errorBox.textContent = '必須項目をすべて入力してください。';
        errorBox.classList.add('show');
        return;
      }

      const password = document.getElementById('password').value;
      if (password.length < 8) {
        errorBox.textContent = 'パスワードは8文字以上で設定してください。';
        errorBox.classList.add('show');
        return;
      }

      btn.disabled = true;
      btn.textContent = '登録中…';

      const formData = {
        last_name:         document.getElementById('last-name').value.trim(),
        first_name:        document.getElementById('first-name').value.trim(),
        last_kana:         document.getElementById('last-kana').value.trim(),
        first_kana:        document.getElementById('first-kana').value.trim(),
        roles:             selectedRoles,
        part:              document.getElementById('part').value,
        category:          document.getElementById('category').value,
        joined_date:       document.getElementById('joined-date').value,
        email:             document.getElementById('email').value.trim(),
        phone:             document.getElementById('phone').value.trim(),
        birthday:          document.getElementById('birthday').value || null,
        emergency_contact: document.getElementById('emergency-contact').value.trim(),
      };

      // ★ 修正: Supabase未接続時はデモ遷移（!_sb で判定）
      if (!_sb) {
        // ★ 修正: 存在しない register-complete.html ではなく login.html へリダイレクト
        window.location.href = 'login.html?registered=1';
        return;
      }

      // Supabase Auth でアカウント作成
      const { data, error } = await _sb.auth.signUp({
        email: formData.email,
        password,
      });

      if (error) {
        btn.disabled = false;
        btn.textContent = '登録する';
        // よくあるエラーを日本語化
        const MSG = {
          'User already registered': 'このメールアドレスはすでに登録されています。',
          'Password should be at least 6 characters': 'パスワードは6文字以上必要です。',
        };
        errorBox.textContent = MSG[error.message] ?? error.message;
        errorBox.classList.add('show');
        return;
      }

      // profiles テーブルに保存
      if (data?.user) {
        const { error: profileError } = await _sb.from('profiles').insert({
          id:                data.user.id,
          last_name:         formData.last_name,
          first_name:        formData.first_name,
          last_kana:         formData.last_kana,
          first_kana:        formData.first_kana,
          roles:             formData.roles,       // text[] 配列で保存
          part:              formData.part,
          category:          formData.category,
          email:             formData.email,
          phone:             formData.phone,
          birthday:          formData.birthday,
          emergency_contact: formData.emergency_contact,
          joined_date:       formData.joined_date,
        });

        if (profileError) {
          // ★ 修正: anon キーでは auth.admin が使えないため deleteUser は削除。
          //   代わりに登録失敗をユーザーに伝え、管理者への連絡を促す。
          console.error('[HighasuiDX] プロフィール保存エラー:', profileError.message, profileError);
          btn.disabled = false;
          btn.textContent = '登録する';
          errorBox.textContent =
            'プロフィール情報の保存に失敗しました。管理者にお問い合わせください。' +
            '（認証アカウントは作成されています）';
          errorBox.classList.add('show');
          return;
        }
      }

      // ★ 修正: 存在しない register-complete.html ではなく login.html へリダイレクト
      window.location.href = 'login.html?registered=1';
    });
  });
</script>
</body>
</html>
